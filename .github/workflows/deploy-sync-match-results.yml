name: Deploy sync-match-results

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SYNC_MATCH_RESULTS_SECRET: ${{ secrets.SYNC_MATCH_RESULTS_SECRET }}
      WORLDCUP2026_API_BASE_URL: ${{ secrets.WORLDCUP2026_API_BASE_URL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate required secrets
        shell: bash
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN" || (echo "Missing SUPABASE_ACCESS_TOKEN" && exit 1)
          test -n "$SUPABASE_PROJECT_REF" || (echo "Missing SUPABASE_PROJECT_REF" && exit 1)
          test -n "$SYNC_MATCH_RESULTS_SECRET" || (echo "Missing SYNC_MATCH_RESULTS_SECRET" && exit 1)
          test -n "$WORLDCUP2026_API_BASE_URL" || (echo "Missing WORLDCUP2026_API_BASE_URL" && exit 1)

      - name: Set Edge Function secrets
        shell: bash
        run: |
          supabase secrets set \
            SYNC_MATCH_RESULTS_SECRET="$SYNC_MATCH_RESULTS_SECRET" \
            WORLDCUP2026_API_BASE_URL="$WORLDCUP2026_API_BASE_URL" \
            --project-ref "$SUPABASE_PROJECT_REF"

      - name: Deploy sync-match-results
        shell: bash
        run: |
          supabase functions deploy sync-match-results \
            --project-ref "$SUPABASE_PROJECT_REF" \
            --no-verify-jwt
